name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-east1
  REPOSITORY: hos-agent
  SERVICE: hos-agent
  IMAGE: us-east1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/hos-agent/app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-and-deploy:
    name: Build image and deploy
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 900 \
            --port 8080 \
            --set-secrets GOOGLE_API_KEY=GOOGLE_API_KEY:latest \
            --set-env-vars ENVIRONMENT=cloud \
            --set-env-vars GCS_BUCKET=${{ vars.GCS_BUCKET }} \
            --set-env-vars GOOGLE_GENAI_USE_VERTEXAI=FALSE \
            --set-env-vars ORCHESTRATOR_MODEL=gemini-2.5-pro \
            --set-env-vars SPECIALIST_MODEL=gemini-2.5-flash \
            --set-env-vars EVALUATOR_MODEL=gemini-2.5-flash \
            --allow-unauthenticated \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
